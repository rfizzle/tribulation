name: Claude Spec Writer

on:
  issues:
    types: [labeled]

concurrency:
  group: claude-spec-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  spec:
    if: github.event.label.name == 'needs-spec'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Load spec-writer prompt
        id: load_prompt
        run: |
          {
            echo 'prompt<<PROMPT_EOF'
            cat .ai/prompts/spec-writer.md
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude spec writer
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ steps.load_prompt.outputs.prompt }}
          claude_args: >-
            --allowedTools
            "Bash(gh issue comment:*),Bash(gh issue view:*)"
