name: Build Artifact

on:
  issue_comment:
    types: [created]

concurrency:
  group: build-artifact-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  build:
    if: >-
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/build') &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-latest
    steps:
      - name: React to comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method POST \
            "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content='eyes'

      - name: Get PR head SHA
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_JSON=$(gh pr view "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --json headRefSha,headRefName)
          echo "sha=$(echo "$PR_JSON" | jq -r .headRefSha)" >> "$GITHUB_OUTPUT"
          echo "branch=$(echo "$PR_JSON" | jq -r .headRefName)" >> "$GITHUB_OUTPUT"

      - name: Check for existing build
        id: dedup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr view "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --json comments \
            --jq '.comments[]
              | select(.author.login == "github-actions[bot]")
              | select(.body | test("Build artifact ready"))
              | select(.body | test("${{ steps.pr.outputs.sha }}"))
              | .body' \
            | head -1)
          if [ -n "$EXISTING" ]; then
            echo "already_built=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_built=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip duplicate build
        if: steps.dedup.outputs.already_built == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "Artifact for commit \`${{ steps.pr.outputs.sha }}\` was already built — see earlier comment above."

      - name: Checkout
        if: steps.dedup.outputs.already_built != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.sha }}

      - name: Set up JDK 21
        if: steps.dedup.outputs.already_built != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        if: steps.dedup.outputs.already_built != 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        if: steps.dedup.outputs.already_built != 'true'
        run: chmod +x ./gradlew

      - name: Build
        if: steps.dedup.outputs.already_built != 'true'
        run: ./gradlew build --no-daemon

      - name: Get mod version
        if: steps.dedup.outputs.already_built != 'true'
        id: version
        run: echo "mod_version=$(./gradlew -q printVersion --no-daemon)" >> "$GITHUB_OUTPUT"

      - name: Upload JAR
        if: steps.dedup.outputs.already_built != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tribulation-${{ steps.version.outputs.mod_version }}-pr${{ github.event.issue.number }}
          path: |
            build/libs/tribulation-*.jar
            !build/libs/tribulation-*-sources.jar
            !build/libs/tribulation-*-dev.jar
          retention-days: 7
          if-no-files-found: error

      - name: Comment with artifact link
        if: steps.dedup.outputs.already_built != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh pr comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "**Build artifact ready** :package:

          | | |
          |---|---|
          | **Version** | \`${{ steps.version.outputs.mod_version }}\` |
          | **Commit** | \`${{ steps.pr.outputs.sha }}\` |
          | **Branch** | \`${{ steps.pr.outputs.branch }}\` |
          | **Download** | [Workflow Run]($RUN_URL) |

          Artifact: \`tribulation-${{ steps.version.outputs.mod_version }}-pr${{ github.event.issue.number }}\` (retained 7 days)"

      - name: React with rocket on success
        if: steps.dedup.outputs.already_built != 'true' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method POST \
            "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content='rocket'

      - name: Comment on failure
        if: failure() && steps.dedup.outputs.already_built != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh pr comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "**Build failed** :x:

          [View build logs]($RUN_URL)

          Commit: \`${{ steps.pr.outputs.sha }}\`"
