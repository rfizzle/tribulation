# Concord suite toolchain — the single source of truth for every member mod's
# Minecraft target and build toolchain. Concord-owned: this file is synced
# verbatim into each member repo by the concord-sync PR (propagate.yml →
# scripts/open-sync-pr.py). Do not hand-edit it in a member repo — bump it here
# in concord and the sync PR carries the change to every member for its CI to
# validate before merge.
#
# A member's own gradle.properties keeps only its repo-specific values: the
# mod_version dev base, maven_group / archives_base_name, per-mod integration
# pins (EMI, REI, JEI, Jade, …), and Gradle daemon/JVM tuning. Those are not
# suite-wide and never live here.
#
# The member build reads these keys by loading this file in settings.gradle (see
# the mc-gradle-builds skill, "Suite toolchain pins"); toolchain-drift.yml flags
# any member whose effective pins fall behind this file.

# Minecraft target the whole suite builds against.
minecraft_version=1.21.1

# Fabric Loader — the mod-loading runtime.
loader_version=0.16.10

# Fabric API — the modding surface, matched to the Minecraft target.
fabric_version=0.116.1+1.21.1

# Fabric Loom — the Gradle build plugin (applied in build.gradle's plugins block).
loom_version=1.9-SNAPSHOT

# Java toolchain the mods compile and run against.
java_version=21
