# Thin stub — logic lives in rfizzle/concord (mod-ci.yml).
# Covers what ci.yml + test.yml used to: build, unit tests + Codecov, gametests.
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write
  issues: read

jobs:
  ci:
    uses: rfizzle/concord/.github/workflows/mod-ci.yml@master
    secrets: inherit
