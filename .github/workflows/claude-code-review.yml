name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Claude Code
        run: curl -fsSL https://claude.ai/install.sh | bash

      - name: Build review prompt
        run: |
          DIFF="$(gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }})"
          PR_TITLE="$(gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --json title --jq .title)"
          PR_BODY="$(gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --json body --jq .body)"

          PROMPT="$(cat .ai/prompts/code-reviewer.md)

          ---
          Project conventions (from AGENTS.md):
          $(cat AGENTS.md)

          ---
          Categories to score (from .ai/review-criteria.yml):
          $(cat .ai/review-criteria.yml)

          ---
          HEAD commit: ${{ github.event.pull_request.head.sha }}

          PR title: ${PR_TITLE}

          PR description:
          ${PR_BODY}

          ---
          Diff:
          ${DIFF}"

          echo "$PROMPT" > /tmp/review-prompt.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run review
        run: |
          ATTEMPT=0
          MAX_ATTEMPTS=3

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Review attempt ${ATTEMPT}/${MAX_ATTEMPTS}"

            RESULT="$(~/.local/bin/claude -p \
              --output-format json \
              --max-turns 6 \
              --max-budget-usd 2.00 \
              < /tmp/review-prompt.txt 2>/tmp/review-stderr.txt)" || true

            COMMENT="$(echo "$RESULT" | jq -r '.result // empty' 2>/dev/null)" || true

            if [ -n "$COMMENT" ] && echo "$COMMENT" | grep -q "## Code Review"; then
              echo "Review produced successfully on attempt ${ATTEMPT}"
              echo "$COMMENT" > /tmp/review-comment.md
              break
            fi

            echo "Attempt ${ATTEMPT} did not produce valid output"
            if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
              echo "::error::All ${MAX_ATTEMPTS} review attempts failed to produce valid output"
              exit 1
            fi
          done
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Post review comment
        run: |
          if [ -s /tmp/review-comment.md ]; then
            gh pr comment ${{ github.event.pull_request.number }} \
              --repo ${{ github.repository }} \
              --body-file /tmp/review-comment.md
          else
            echo "No review comment to post"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
