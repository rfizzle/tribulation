name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: read
  id-token: write

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load review prompt
        id: load_prompt
        run: |
          {
            echo 'prompt<<PROMPT_EOF'
            cat .ai/prompts/code-reviewer.md
            echo
            echo "---"
            echo "Categories to score (from .ai/review-criteria.yml):"
            cat .ai/review-criteria.yml
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ steps.load_prompt.outputs.prompt }}
          claude_args: >-
            --allowedTools
            "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
