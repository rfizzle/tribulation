name: Claude Spec Writer

on:
  issues:
    types: [labeled]

concurrency:
  group: claude-spec-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  spec:
    if: github.event.label.name == 'needs-spec'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Claude Code
        run: curl -fsSL https://claude.ai/install.sh | bash

      - name: Build spec prompt
        run: |
          ISSUE_TITLE="$(gh issue view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json title --jq .title)"
          ISSUE_BODY="$(gh issue view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json body --jq .body)"

          PROMPT="$(cat .ai/prompts/spec-writer.md)

          ---
          Issue #${{ github.event.issue.number }}: ${ISSUE_TITLE}

          ${ISSUE_BODY}"

          echo "$PROMPT" > /tmp/spec-prompt.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run spec writer
        run: |
          SCHEMA='{
            "type": "object",
            "properties": {
              "comment": {
                "type": "string",
                "description": "The full implementation spec in Markdown. Must start with ## Implementation Spec and include Problem, Goal, Acceptance criteria, Approach, Files to touch, Test plan sections."
              }
            },
            "required": ["comment"]
          }'

          ATTEMPT=0
          MAX_ATTEMPTS=3

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Spec attempt ${ATTEMPT}/${MAX_ATTEMPTS}"

            RESULT="$(~/.local/bin/claude -p \
              --output-format json \
              --json-schema "$SCHEMA" \
              --max-turns 6 \
              --max-budget-usd 2.00 \
              --dangerously-skip-permissions \
              < /tmp/spec-prompt.txt 2>/tmp/spec-stderr.txt)" || true

            if [ -z "$RESULT" ]; then
              echo "Claude produced no output. Stderr:"
              cat /tmp/spec-stderr.txt 2>/dev/null || true
            fi

            COMMENT="$(echo "$RESULT" | jq -r '.result.comment // empty' 2>/dev/null)" || true

            if [ -n "$COMMENT" ] && echo "$COMMENT" | grep -q "## Implementation Spec"; then
              echo "Spec produced successfully on attempt ${ATTEMPT}"
              echo "$COMMENT" > /tmp/spec-comment.md
              break
            fi

            echo "Attempt ${ATTEMPT} did not produce valid output"
            if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
              echo "::warning::All ${MAX_ATTEMPTS} spec attempts failed to produce valid output"
              echo "Last stderr:"
              cat /tmp/spec-stderr.txt 2>/dev/null || true
              exit 0
            fi
          done
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Post spec comment
        run: |
          if [ -s /tmp/spec-comment.md ]; then
            gh issue comment ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --body-file /tmp/spec-comment.md
          else
            echo "No spec comment to post"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
